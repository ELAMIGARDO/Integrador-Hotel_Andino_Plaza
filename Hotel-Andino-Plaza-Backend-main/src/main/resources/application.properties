spring.application.name=Hotel-Andino-Plaza

#  CONFIGURACIÓN DE LA BASE DE DATOS (CORREGIDO DE UTC A AMERICA/LIMA)
spring.datasource.url=jdbc:mysql://localhost:3306/hotelandinoplaza?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#  FUERZA A SPRING BOOT A RESPONDER LOS JSON EN TU HORA LOCAL (Evita desfases con React)
spring.jackson.time-zone=America/Lima
spring.jpa.properties.hibernate.jdbc.time_zone=America/Lima

# Configuración de Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuración del Servidor
server.port=8080
